<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mon Organiseur Drive V33</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .syncbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px}.syncbar button{padding:8px 10px;border-radius:10px;border:1px solid #d9dde8;background:#fff;cursor:pointer}.syncbar .primary{background:#2563eb;color:#fff;border-color:#2563eb}.syncStatus{font-size:12px;color:#475569}.setupBox{background:#fff7ed;border:1px solid #fed7aa;padding:10px;border-radius:12px;margin-top:10px}.setupBox input{width:min(520px,100%);padding:8px;border:1px solid #ddd;border-radius:8px}.hiddenSetup{display:none}.cloudBadge{font-size:12px;background:#e0f2fe;color:#075985;padding:4px 8px;border-radius:999px}
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="brand"><div class="logo">O</div><div><strong>Mon Organiseur</strong><span>version Drive V33</span></div></div>
    <button class="nav active" data-view="board">📋 Tableau</button>
    <button class="nav" data-view="list">☑️ Liste</button>
    <button class="nav" data-view="calendar">📅 Échéances</button>
    <button class="nav" data-view="stats">📊 Résumé</button>
    <hr>
    <button id="newPlanBtn" class="ghost">+ Nouveau plan</button>
    <div id="plansList" class="plans"></div>
    <hr>
    <button id="exportBtn" class="ghost">Exporter JSON</button>
    <label class="ghost fileBtn">Importer JSON<input id="importInput" type="file" accept="application/json"></label>
    <button id="resetBtn" class="ghost danger">Réinitialiser</button>
  </aside>

  <main class="app">
    <header class="topbar">
      <div>
        <input id="planTitle" class="planTitle" aria-label="Nom du plan">
        <p>Organiseur simple avec sauvegarde automatique Google Drive.</p>
        <div class="syncbar no-print">
          <button id="connectDriveBtn" class="primary">Se connecter à Google Drive</button>
          <button id="loadDriveBtn">Charger depuis Drive</button>
          <button id="saveDriveBtn">Sauvegarder maintenant</button>
          <button id="disconnectDriveBtn">Déconnecter</button>
          <span id="syncStatus" class="syncStatus">Drive non connecté</span>
        </div>
        <div id="setupBox" class="setupBox no-print">
          <strong>Configuration Google</strong><br>
          <small>Colle ici ton Client ID Google. Il est sauvegardé uniquement dans ton navigateur.</small><br>
          <input id="googleClientId" placeholder="ex: 123456789-xxxx.apps.googleusercontent.com">
          <button id="saveClientIdBtn">Enregistrer le Client ID</button>
        </div>
      </div>
      <div class="topActions no-print">
        <input id="searchInput" placeholder="Rechercher...">
        <select id="filterStatus"><option value="all">Toutes</option><option value="todo">Non terminées</option><option value="done">Terminées</option><option value="late">En retard</option></select>
        <select id="printSelect" class="printSelect" title="Choix d'impression">
          <option value="">🖨️ Imprimer...</option>
          <option value="current">Page actuelle</option>
          <option value="board">Tableau principal</option>
          <option value="list">Liste</option>
          <option value="calendar">Échéances</option>
          <option value="stats">Résumé</option>
          <option value="all">Tout imprimer</option>
        </select>
        <button id="addBucketBtn">+ Colonne</button>
        <button id="addTaskTopBtn" class="primary">+ Tâche</button>
      </div>
    </header>

    <section id="boardView" class="view board print-section" data-print="board"></section>
    <section id="listView" class="view hidden print-section" data-print="list"></section>
    <section id="calendarView" class="view hidden print-section" data-print="calendar"></section>
    <section id="statsView" class="view hidden print-section" data-print="stats"></section>
  </main>

  <dialog id="taskDialog">
    <form id="taskForm" method="dialog">
      <h2 id="dialogTitle">Nouvelle tâche</h2><input type="hidden" id="taskId">
      <label>Titre<input id="taskTitle" required maxlength="100"></label>
      <label>Colonne<select id="taskBucket"></select></label>
      <label>Notes<textarea id="taskNotes" rows="4" placeholder="Détails de la tâche..."></textarea></label>
      <div class="grid2"><label>Responsable<input id="taskAssignee" placeholder="Christophe, équipe, fournisseur..."></label><label>Échéance<input id="taskDueDate" type="date"></label></div>
      <div class="grid2"><label>Priorité<select id="taskPriority"><option value="low">Basse</option><option value="normal">Normale</option><option value="high">Haute</option><option value="urgent">Urgente</option></select></label><label>Progression<select id="taskProgress"><option value="todo">Non commencé</option><option value="doing">En cours</option><option value="done">Terminé</option></select></label></div>
      <label>Labels<input id="taskLabels" placeholder="ex: drone, achat, urgent"></label>
      <label>Checklist <small>une ligne = une action</small><textarea id="taskChecklist" rows="4" placeholder="Commander les pièces\nVérifier la livraison\nTester"></textarea></label>
      <menu><button type="button" id="deleteTaskBtn" class="danger">Supprimer</button><span></span><button type="button" id="cancelDialog">Annuler</button><button type="submit" class="primary">Enregistrer</button></menu>
    </form>
  </dialog>

  <script async defer src="https://accounts.google.com/gsi/client"></script>
  <script src="https://apis.google.com/js/api.js"></script>
  <script src="app.js"></script>
</body>
</html>
